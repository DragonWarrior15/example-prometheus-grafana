# global config
global:
  scrape_interval: 5s # default is every 1 minute
  evaluation_interval: 5s # default is every 1 minute

# Alertmanager configuration
# we will disable it for now
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_internal'
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config
  # This is the prometheus system itself
  - job_name: "prometheus"

    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'

    static_configs:
    - targets: ["localhost:9090"]
    # the label name is added as a label `label_name=<label-value>` to any timeseries scraped from this config
      labels:
        app: "prometheus"

  - job_name: "sleep_time"
    static_configs:
    - targets: ["<your-ip-address>:8000"]
      labels:
        app: "sleep_time"
